name: Release

on:
  push:
    tags:
      - 'v*'
      - 'v*-beta*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.1)'
        required: true
      channel:
        description: 'Release channel (stable | beta)'
        required: false
        default: 'stable'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm
            os: macos-15
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
          - platform: macos-intel
            os: macos-15-intel
            args: '--target x86_64-apple-darwin'
            target: x86_64-apple-darwin
          - platform: windows
            os: windows-2025
            args: ''
            target: x86_64-pc-windows-msvc
          - platform: linux
            os: ubuntu-22.04
            args: ''
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libsecret-1-dev pkg-config

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      # tauri.conf.json beforeBuildCommand = "npm run build" (Vite). Without
      # Node + deps on PATH, `cargo tauri build` exits 127 before producing
      # any artifacts.
      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm install

      - name: Generate app icons
        working-directory: src-tauri
        run: cargo tauri icon icons/icon.svg

      - name: Bundle Python sidecar (Windows)
        if: matrix.platform == 'windows'
        shell: powershell
        run: .\scripts\bundle-sidecar.ps1 -Python "python"

      - name: Bundle Python sidecar (macOS/Linux)
        if: matrix.platform != 'windows'
        shell: bash
        run: bash ./scripts/bundle-sidecar.sh

      # ── macOS signing (no-op when APPLE_CERTIFICATE secret is not set) ────
      - name: Import Apple certificate
        if: startsWith(matrix.platform, 'macos') && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain
          rm certificate.p12

      # ── Windows signing (no-op when WINDOWS_CERTIFICATE secret is not set) ─
      - name: Import Windows certificate
        if: matrix.platform == 'windows' && env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE:          ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: powershell
        run: |
          $cert = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          [IO.File]::WriteAllBytes("certificate.pfx", $cert)
          Import-PfxCertificate -FilePath certificate.pfx `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force)
          Remove-Item certificate.pfx

      # ── Determine channel & prerelease flag ──────────────────────────────
      - name: Set channel
        id: channel
        shell: bash
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            TAG="v${INPUT_VERSION#v}"
          else
            TAG="${GITHUB_REF_NAME:-v0.0.0}"
          fi
          V="${TAG#v}"
          echo "tag=$TAG"       >> $GITHUB_OUTPUT
          echo "version=$V"     >> $GITHUB_OUTPUT
          if [[ "$TAG" == *"beta"* ]] || [[ "$TAG" == v0.* ]] || [[ "${{ github.event.inputs.channel }}" == "beta" ]]; then
            echo "prerelease=true"  >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      # ── Extract release notes from CHANGELOG.md ──────────────────────────
      - name: Extract release notes
        id: notes
        shell: bash
        run: |
          V="${{ steps.channel.outputs.version }}"
          NOTES=$(awk "/^## \[$V\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md 2>/dev/null || true)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for release notes."
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # ── Set Apple env vars (macOS only) ──────────────────────────────────
      # Tauri triggers notarization whenever APPLE_ID is present in the
      # environment — even as an empty string.  So we must NOT set it at all
      # when no developer certificate is available.  This step writes the vars
      # into GITHUB_ENV only when APPLE_CERTIFICATE is non-empty.
      - name: Configure Apple signing env
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          _CERT:     ${{ secrets.APPLE_CERTIFICATE }}
          _IDENT:    ${{ secrets.APPLE_SIGNING_IDENTITY }}
          _ID:       ${{ secrets.APPLE_ID }}
          _PASS:     ${{ secrets.APPLE_PASSWORD }}
          _TEAM:     ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$_CERT" ]; then
            echo "APPLE_SIGNING_IDENTITY=$_IDENT" >> $GITHUB_ENV
            echo "APPLE_ID=$_ID"                  >> $GITHUB_ENV
            echo "APPLE_PASSWORD=$_PASS"          >> $GITHUB_ENV
            echo "APPLE_TEAM_ID=$_TEAM"           >> $GITHUB_ENV
          else
            # Ad-hoc signing only — notarization vars are intentionally absent
            echo "APPLE_SIGNING_IDENTITY=-"       >> $GITHUB_ENV
          fi

      # ── Build ─────────────────────────────────────────────────────────────
      # macOS-15 runners flake on Tauri's bundle_dmg.sh (hdiutil/diskimages-
      # help race + osascript window-styling timeout). The Rust compile
      # itself never flakes — only the post-build DMG packaging — so a small
      # outer retry is the lowest-cost mitigation. v1.1.1 hit this on the
      # macos-intel runner and lost the DMG asset for that platform.
      - name: Build Tauri app (macOS, retry on DMG flake)
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          set +e
          attempts=3
          for i in $(seq 1 $attempts); do
            echo "::group::Tauri build attempt $i/$attempts"
            cargo tauri build ${{ matrix.args }}
            code=$?
            echo "::endgroup::"
            if [ $code -eq 0 ]; then break; fi
            if [ $i -eq $attempts ]; then
              echo "::error::Tauri build failed after $attempts attempts"
              exit $code
            fi
            # diskimages-help can stay wedged across attempts — kill it before retry.
            pkill -f diskimages-help 2>/dev/null || true
            pkill -f hdiutil 2>/dev/null || true
            # Clear stale DMG scratch so bundle_dmg.sh starts from clean state.
            rm -rf src-tauri/target/${{ matrix.target }}/release/bundle/dmg 2>/dev/null || true
            echo "Attempt $i failed (exit $code). Sleeping 20s and retrying."
            sleep 20
          done
        env:
          TAURI_PRIVATE_KEY:              ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD:             ${{ secrets.TAURI_KEY_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}

      - name: Build Tauri app (Windows/Linux)
        if: matrix.platform == 'windows' || matrix.platform == 'linux'
        run: cargo tauri build ${{ matrix.args }}
        env:
          TAURI_PRIVATE_KEY:              ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD:             ${{ secrets.TAURI_KEY_PASSWORD }}
          # Apple vars (APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_TEAM_ID,
          # APPLE_PASSWORD) are injected by the step above via GITHUB_ENV.
          # They are NOT set here so that empty-string secrets never reach Tauri.
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}

      - name: Smoke unsigned Windows package
        if: matrix.platform == 'windows'
        shell: powershell
        run: powershell -NoProfile -ExecutionPolicy Bypass -File scripts\smoke-installed-build.ps1 -InstallNsis

      - name: Verify Linux package artifacts
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          appimage=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" -type f | head -1)
          deb=$(find src-tauri/target/release/bundle/deb -name "*.deb" -type f | head -1)
          test -n "$appimage" && test -s "$appimage"
          test -n "$deb" && test -s "$deb"
          echo "AppImage: $appimage"
          echo "Deb: $deb"

      - name: Normalize Windows beta asset names
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          $version = "${{ steps.channel.outputs.version }}"
          $assets = @(
            @{ Dir = "src-tauri\target\release\bundle\nsis"; Pattern = "SignalOS_*_x64-setup.exe"; Name = "SignalOS_${version}_x64-setup.exe" },
            @{ Dir = "src-tauri\target\release\bundle\nsis"; Pattern = "SignalOS_*_x64-setup.exe.sig"; Name = "SignalOS_${version}_x64-setup.exe.sig" },
            @{ Dir = "src-tauri\target\release\bundle\msi"; Pattern = "SignalOS_*_x64_en-US.msi"; Name = "SignalOS_${version}_x64_en-US.msi" },
            @{ Dir = "src-tauri\target\release\bundle\msi"; Pattern = "SignalOS_*_x64_en-US.msi.sig"; Name = "SignalOS_${version}_x64_en-US.msi.sig" }
          )
          foreach ($asset in $assets) {
            if (-not (Test-Path $asset.Dir)) { continue }
            $file = Get-ChildItem -LiteralPath $asset.Dir -Filter $asset.Pattern | Select-Object -First 1
            if (-not $file) { continue }
            $target = Join-Path $asset.Dir $asset.Name
            $targetPath = [IO.Path]::GetFullPath($target)
            if ($file.FullName -ne $targetPath) {
              Move-Item -LiteralPath $file.FullName -Destination $target -Force
            }
          }

      # ── Upload artifacts — macOS ──────────────────────────────────────────
      - name: Upload release assets (macOS)
        if: startsWith(matrix.platform, 'macos')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.channel.outputs.tag }}
          draft: false
          prerelease: ${{ steps.channel.outputs.prerelease }}
          body: ${{ steps.notes.outputs.notes }}
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig

      # ── Upload artifacts — Windows ────────────────────────────────────────
      - name: Upload release assets (Windows)
        if: matrix.platform == 'windows'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.channel.outputs.tag }}
          draft: false
          prerelease: ${{ steps.channel.outputs.prerelease }}
          body: ${{ steps.notes.outputs.notes }}
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig

      # ── Upload artifacts — Linux ──────────────────────────────────────────
      - name: Upload release assets (Linux)
        if: matrix.platform == 'linux'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.channel.outputs.tag }}
          draft: false
          prerelease: ${{ steps.channel.outputs.prerelease }}
          body: ${{ steps.notes.outputs.notes }}
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/release/bundle/deb/*.deb

  # ── Update manifests (stable + beta) ─────────────────────────────────────
  publish-manifest:
    name: Publish update manifest
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract version + channel
        id: meta
        shell: bash
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            TAG="v${INPUT_VERSION#v}"
          else
            TAG="${GITHUB_REF_NAME:-v0.0.0}"
          fi
          V="${TAG#v}"
          echo "version=$V" >> $GITHUB_OUTPUT
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "date=$DATE"  >> $GITHUB_OUTPUT
          if [[ "$TAG" == *"beta"* ]] || [[ "$TAG" == v0.* ]] || [[ "${{ github.event.inputs.channel }}" == "beta" ]]; then
            echo "channel=beta"   >> $GITHUB_OUTPUT
          else
            echo "channel=stable" >> $GITHUB_OUTPUT
          fi

      # ── Fetch .sig files from the GitHub Release assets ──────────────────
      - name: Fetch release signatures
        id: sigs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          V="${{ steps.meta.outputs.version }}"
          TAG="v$V"
          REPO="${GITHUB_REPOSITORY}"
          BASE="https://api.github.com/repos/${REPO}/releases/tags/${TAG}"

          ASSETS=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "$BASE/assets" 2>/dev/null || echo "[]")

          fetch_sig() {
            local pattern="$1"
            local url
            url=$(echo "$ASSETS" | python3 -c "
          import sys, json, re
          assets = json.load(sys.stdin)
          for a in assets:
              if re.search(r'$pattern', a['name']):
                  print(a['browser_download_url'])
                  break
          " 2>/dev/null || true)
            if [ -n "$url" ]; then
              curl -s -L -H "Authorization: Bearer $GITHUB_TOKEN" "$url" || echo ""
            fi
          }

          SIG_MAC_ARM=$(fetch_sig "aarch64.*\.sig$")
          SIG_MAC_X64=$(fetch_sig "x64.*\.dmg\.sig$|x86_64.*darwin.*\.sig$")
          SIG_WIN=$(fetch_sig "x64-setup.*\.sig$|windows.*\.sig$")
          SIG_LIN=$(fetch_sig "amd64.*\.AppImage\.sig$")

          echo "mac_arm=${SIG_MAC_ARM}"  >> $GITHUB_OUTPUT
          echo "mac_x64=${SIG_MAC_X64}" >> $GITHUB_OUTPUT
          echo "win=${SIG_WIN}"         >> $GITHUB_OUTPUT
          echo "lin=${SIG_LIN}"         >> $GITHUB_OUTPUT

      # ── Extract release notes for manifest ───────────────────────────────
      - name: Extract notes snippet
        id: notes
        shell: bash
        run: |
          V="${{ steps.meta.outputs.version }}"
          NOTES=$(awk "/^## \[$V\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md 2>/dev/null || true)
          NOTES="${NOTES:-SignalOS v$V}"
          NOTES_LINE=$(echo "$NOTES" | head -3 | tr '\n' ' ' | sed 's/["\]/\\&/g')
          echo "line=$NOTES_LINE" >> $GITHUB_OUTPUT

      # ── Write stable manifest ─────────────────────────────────────────────
      - name: Write latest.json
        if: steps.meta.outputs.channel == 'stable'
        run: |
          V="${{ steps.meta.outputs.version }}"
          DATE="${{ steps.meta.outputs.date }}"
          NOTES="${{ steps.notes.outputs.line }}"
          cat > distribution/update-manifest/latest.json << EOF
          {
            "version": "$V",
            "notes":   "$NOTES",
            "pub_date": "$DATE",
            "platforms": {
              "darwin-aarch64": {
                "url":       "https://github.com/${GITHUB_REPOSITORY}/releases/download/v$V/SignalOS_${V}_aarch64.dmg",
                "signature": "${{ steps.sigs.outputs.mac_arm }}"
              },
              "darwin-x86_64": {
                "url":       "https://github.com/${GITHUB_REPOSITORY}/releases/download/v$V/SignalOS_${V}_x64.dmg",
                "signature": "${{ steps.sigs.outputs.mac_x64 }}"
              },
              "windows-x86_64": {
                "url":       "https://github.com/${GITHUB_REPOSITORY}/releases/download/v$V/SignalOS_${V}_x64-setup.exe",
                "signature": "${{ steps.sigs.outputs.win }}"
              },
              "linux-x86_64": {
                "url":       "https://github.com/${GITHUB_REPOSITORY}/releases/download/v$V/SignalOS_${V}_amd64.AppImage",
                "signature": "${{ steps.sigs.outputs.lin }}"
              }
            }
          }
          EOF

      # ── Write beta manifest ───────────────────────────────────────────────
      - name: Write beta.json
        if: steps.meta.outputs.channel == 'beta'
        run: |
          V="${{ steps.meta.outputs.version }}"
          DATE="${{ steps.meta.outputs.date }}"
          NOTES="${{ steps.notes.outputs.line }}"
          cat > distribution/update-manifest/beta.json << EOF
          {
            "version": "$V",
            "notes":   "$NOTES",
            "pub_date": "$DATE",
            "platforms": {
              "darwin-aarch64": {
                "url":       "https://github.com/${GITHUB_REPOSITORY}/releases/download/v$V/SignalOS_${V}_aarch64.dmg",
                "signature": "${{ steps.sigs.outputs.mac_arm }}"
              },
              "darwin-x86_64": {
                "url":       "https://github.com/${GITHUB_REPOSITORY}/releases/download/v$V/SignalOS_${V}_x64.dmg",
                "signature": "${{ steps.sigs.outputs.mac_x64 }}"
              },
              "windows-x86_64": {
                "url":       "https://github.com/${GITHUB_REPOSITORY}/releases/download/v$V/SignalOS_${V}_x64-setup.exe",
                "signature": "${{ steps.sigs.outputs.win }}"
              },
              "linux-x86_64": {
                "url":       "https://github.com/${GITHUB_REPOSITORY}/releases/download/v$V/SignalOS_${V}_amd64.AppImage",
                "signature": "${{ steps.sigs.outputs.lin }}"
              }
            }
          }
          EOF

      - name: Commit manifests
        run: |
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add distribution/update-manifest/
          git diff --cached --quiet || \
            git commit -m "chore: update manifests to v${{ steps.meta.outputs.version }} [${{ steps.meta.outputs.channel }}]"
          # Tags check out in detached-HEAD state — push explicitly to main
          git push origin HEAD:main
