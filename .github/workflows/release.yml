name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.1)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm
            os: macos-latest
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
          - platform: macos-intel
            os: macos-latest
            args: '--target x86_64-apple-darwin'
            target: x86_64-apple-darwin
          - platform: windows
            os: windows-latest
            args: ''
            target: x86_64-pc-windows-msvc
          - platform: linux
            os: ubuntu-22.04
            args: ''
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libsecret-1-dev pkg-config

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      # ── macOS signing (no-op when APPLE_CERTIFICATE secret is not set) ────
      - name: Import Apple certificate
        if: matrix.os == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain
          rm certificate.p12

      # ── Windows signing (no-op when WINDOWS_CERTIFICATE secret is not set) ─
      - name: Import Windows certificate
        if: matrix.platform == 'windows' && env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE:          ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: powershell
        run: |
          $cert = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          [IO.File]::WriteAllBytes("certificate.pfx", $cert)
          Import-PfxCertificate -FilePath certificate.pfx `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force)
          Remove-Item certificate.pfx

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN:                   ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY:              ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD:             ${{ secrets.TAURI_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY:         ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID:                       ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD:                 ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID:                  ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
        with:
          tagName:      ${{ github.ref_name }}
          releaseName:  'SignalOS v__VERSION__'
          releaseBody:  'See CHANGELOG.md for release notes.'
          releaseDraft: true
          prerelease:   false
          args:         ${{ matrix.args }}

  # ── Update manifest ───────────────────────────────────────────────────────
  publish-manifest:
    name: Publish update manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Write latest.json
        run: |
          V="${{ steps.ver.outputs.version }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat > distribution/update-manifest/latest.json << EOF
          {
            "version": "$V",
            "notes": "SignalOS v$V",
            "pub_date": "$DATE",
            "platforms": {
              "darwin-aarch64":  { "url": "https://github.com/samerzakaria/signalos-app/releases/download/v$V/SignalOS_${V}_aarch64.dmg",      "signature": "" },
              "darwin-x86_64":   { "url": "https://github.com/samerzakaria/signalos-app/releases/download/v$V/SignalOS_${V}_x64.dmg",           "signature": "" },
              "windows-x86_64":  { "url": "https://github.com/samerzakaria/signalos-app/releases/download/v$V/SignalOS_${V}_x64-setup.exe",     "signature": "" },
              "linux-x86_64":    { "url": "https://github.com/samerzakaria/signalos-app/releases/download/v$V/signalos-app_${V}_amd64.AppImage","signature": "" }
            }
          }
          EOF

      - name: Commit manifest
        run: |
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add distribution/update-manifest/latest.json
          git diff --cached --quiet || \
            git commit -m "chore: update manifest to v${{ steps.ver.outputs.version }}"
          git push
