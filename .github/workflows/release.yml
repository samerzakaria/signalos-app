name: Release

on:
  push:
    tags:
      - 'v*'
      - 'v*-beta*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.1)'
        required: true
      channel:
        description: 'Release channel (stable | beta)'
        required: false
        default: 'stable'

env:
  CARGO_TERM_COLOR: always

jobs:
  rustsec-audit:
    name: RustSec audit policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate Tauri command ACL
        run: python scripts/validate-tauri-acl.py
      - name: Validate RustSec exception policy
        run: python scripts/validate-rustsec-exceptions.py --cargo-dir src-tauri
      - name: cargo audit policy
        working-directory: src-tauri
        run: |
          cargo install --quiet cargo-audit --locked
          cargo audit --deny warnings

  build:
    name: Build (${{ matrix.platform }})
    needs: rustsec-audit
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm
            os: macos-15
            args: '--target aarch64-apple-darwin'
            target: aarch64-apple-darwin
          - platform: macos-intel
            os: macos-15-intel
            args: '--target x86_64-apple-darwin'
            target: x86_64-apple-darwin
          - platform: windows
            os: windows-2025
            args: ''
            target: x86_64-pc-windows-msvc
          - platform: linux
            os: ubuntu-22.04
            args: ''
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install platform system deps
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" != "linux" ]; then
            echo "No platform system deps required for ${{ matrix.platform }}."
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libsecret-1-dev pkg-config

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      # tauri.conf.json beforeBuildCommand = "npm run build" (Vite). Without
      # Node + deps on PATH, `cargo tauri build` exits 127 before producing
      # any artifacts.
      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm install

      - name: Generate app icons
        working-directory: src-tauri
        run: cargo tauri icon icons/icon.svg

      - name: Bundle Python sidecar
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "windows" ]; then
            powershell -NoProfile -ExecutionPolicy Bypass -File ./scripts/bundle-sidecar.ps1 -Python "python"
          else
            bash ./scripts/bundle-sidecar.sh
          fi

      # ── macOS signing (no-op when APPLE_CERTIFICATE secret is not set) ────
      - name: Import Apple certificate
        shell: bash
        env:
          APPLE_CERTIFICATE:          ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [[ "${{ matrix.platform }}" != macos* ]]; then
            echo "Apple certificate import does not apply to ${{ matrix.platform }}."
            exit 0
          fi
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "APPLE_CERTIFICATE is not configured; using ad-hoc signing."
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import certificate.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain
          rm certificate.p12

      # ── Windows signing (no-op when WINDOWS_CERTIFICATE secret is not set) ─
      - name: Import Windows certificate
        env:
          WINDOWS_CERTIFICATE:          ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: pwsh
        run: |
          if ("${{ matrix.platform }}" -ne "windows") {
            Write-Host "Windows certificate import does not apply to ${{ matrix.platform }}."
            exit 0
          }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE)) {
            Write-Host "WINDOWS_CERTIFICATE is not configured; building unsigned package."
            exit 0
          }
          $cert = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          [IO.File]::WriteAllBytes("certificate.pfx", $cert)
          Import-PfxCertificate -FilePath certificate.pfx `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force)
          Remove-Item certificate.pfx

      # ── Determine channel & prerelease flag ──────────────────────────────
      - name: Set channel
        id: channel
        shell: bash
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            TAG="v${INPUT_VERSION#v}"
          else
            TAG="${GITHUB_REF_NAME:-v0.0.0}"
          fi
          V="${TAG#v}"
          echo "tag=$TAG"       >> $GITHUB_OUTPUT
          echo "version=$V"     >> $GITHUB_OUTPUT
          # Any tag with a SemVer prerelease suffix (-beta, -internal, -rc, -alpha, -pre…)
          # plus v0.x is treated as prerelease. Without this, v2.0.0-internal landed as
          # stable and the manifest commit broke macOS/Linux auto-update.
          if [[ "$TAG" =~ -[a-zA-Z] ]] || [[ "$TAG" == v0.* ]] || [[ "${{ github.event.inputs.channel }}" == "beta" ]]; then
            echo "prerelease=true"  >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      # ── Extract release notes from CHANGELOG.md ──────────────────────────
      - name: Extract release notes
        id: notes
        shell: bash
        run: |
          V="${{ steps.channel.outputs.version }}"
          NOTES=$(awk "/^## \[$V\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md 2>/dev/null || true)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for release notes."
          fi
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      # ── Set Apple env vars (macOS only) ──────────────────────────────────
      # Tauri triggers notarization whenever APPLE_ID is present in the
      # environment — even as an empty string.  So we must NOT set it at all
      # when no developer certificate is available.  This step writes the vars
      # into GITHUB_ENV only when APPLE_CERTIFICATE is non-empty.
      - name: Configure Apple signing env
        shell: bash
        env:
          _CERT:     ${{ secrets.APPLE_CERTIFICATE }}
          _IDENT:    ${{ secrets.APPLE_SIGNING_IDENTITY }}
          _ID:       ${{ secrets.APPLE_ID }}
          _PASS:     ${{ secrets.APPLE_PASSWORD }}
          _TEAM:     ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ "${{ matrix.platform }}" != macos* ]]; then
            echo "Apple signing env does not apply to ${{ matrix.platform }}."
            exit 0
          fi
          if [ -n "$_CERT" ]; then
            echo "APPLE_SIGNING_IDENTITY=$_IDENT" >> $GITHUB_ENV
            echo "APPLE_ID=$_ID"                  >> $GITHUB_ENV
            echo "APPLE_PASSWORD=$_PASS"          >> $GITHUB_ENV
            echo "APPLE_TEAM_ID=$_TEAM"           >> $GITHUB_ENV
          else
            # Ad-hoc signing only — notarization vars are intentionally absent
            echo "APPLE_SIGNING_IDENTITY=-"       >> $GITHUB_ENV
          fi

      # ── Build ─────────────────────────────────────────────────────────────
      # macOS-15 runners flake on Tauri's bundle_dmg.sh (hdiutil/diskimages-
      # help race + osascript window-styling timeout). The Rust compile
      # itself never flakes — only the post-build DMG packaging — so a small
      # outer retry is the lowest-cost mitigation. v1.1.1 hit this on the
      # macos-intel runner and lost the DMG asset for that platform.
      - name: Build Tauri app
        shell: bash
        run: |
          if [[ "${{ matrix.platform }}" == macos* ]]; then
            set +e
          attempts=3
          for i in $(seq 1 $attempts); do
            echo "::group::Tauri build attempt $i/$attempts"
            cargo tauri build ${{ matrix.args }}
            code=$?
            echo "::endgroup::"
            if [ $code -eq 0 ]; then break; fi
            if [ $i -eq $attempts ]; then
              echo "::error::Tauri build failed after $attempts attempts"
              exit $code
            fi
            # diskimages-help can stay wedged across attempts — kill it before retry.
            pkill -f diskimages-help 2>/dev/null || true
            pkill -f hdiutil 2>/dev/null || true
            # Clear stale DMG scratch so bundle_dmg.sh starts from clean state.
            rm -rf src-tauri/target/${{ matrix.target }}/release/bundle/dmg 2>/dev/null || true
            echo "Attempt $i failed (exit $code). Sleeping 20s and retrying."
            sleep 20
          done
          else
            cargo tauri build ${{ matrix.args }}
          fi
        env:
          # Tauri 2 renamed: TAURI_PRIVATE_KEY → TAURI_SIGNING_PRIVATE_KEY,
          # TAURI_KEY_PASSWORD → TAURI_SIGNING_PRIVATE_KEY_PASSWORD. The
          # secrets are still stored under the old names in GitHub Actions.
          TAURI_SIGNING_PRIVATE_KEY:          ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          WINDOWS_CERTIFICATE_THUMBPRINT:     ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}

      - name: Smoke unsigned Windows package
        timeout-minutes: 20
        shell: pwsh
        run: |
          if ("${{ matrix.platform }}" -ne "windows") {
            Write-Host "Windows package smoke does not apply to ${{ matrix.platform }}."
            exit 0
          }
          ./scripts/smoke-installed-build.ps1 -InstallNsis

      - name: Verify Linux package artifacts
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" != "linux" ]; then
            echo "Linux package artifact verification does not apply to ${{ matrix.platform }}."
            exit 0
          fi
          appimage=$(find src-tauri/target/release/bundle/appimage -name "*.AppImage" -type f | head -1)
          deb=$(find src-tauri/target/release/bundle/deb -name "*.deb" -type f | head -1)
          test -n "$appimage" && test -s "$appimage"
          test -n "$deb" && test -s "$deb"
          echo "AppImage: $appimage"
          echo "Deb: $deb"

      - name: Normalize Windows beta asset names
        shell: pwsh
        run: |
          if ("${{ matrix.platform }}" -ne "windows") {
            Write-Host "Windows beta asset normalization does not apply to ${{ matrix.platform }}."
            exit 0
          }
          $version = "${{ steps.channel.outputs.version }}"
          $assets = @(
            @{ Dir = "src-tauri\target\release\bundle\nsis"; Pattern = "SignalOS_*_x64-setup.exe"; Name = "SignalOS_${version}_x64-setup.exe" },
            @{ Dir = "src-tauri\target\release\bundle\nsis"; Pattern = "SignalOS_*_x64-setup.exe.sig"; Name = "SignalOS_${version}_x64-setup.exe.sig" },
            @{ Dir = "src-tauri\target\release\bundle\msi"; Pattern = "SignalOS_*_x64_en-US.msi"; Name = "SignalOS_${version}_x64_en-US.msi" },
            @{ Dir = "src-tauri\target\release\bundle\msi"; Pattern = "SignalOS_*_x64_en-US.msi.sig"; Name = "SignalOS_${version}_x64_en-US.msi.sig" }
          )
          foreach ($asset in $assets) {
            if (-not (Test-Path $asset.Dir)) { continue }
            $file = Get-ChildItem -LiteralPath $asset.Dir -Filter $asset.Pattern | Select-Object -First 1
            if (-not $file) { continue }
            $target = Join-Path $asset.Dir $asset.Name
            $targetPath = [IO.Path]::GetFullPath($target)
            if ($file.FullName -ne $targetPath) {
              Move-Item -LiteralPath $file.FullName -Destination $target -Force
            }
          }

      # ── Upload artifacts — race-safe via gh CLI ──────────────────────────
      # softprops/action-gh-release@v2 has a known race when 4 matrix jobs
      # all try to "create" the same release in parallel: the first wins,
      # subsequent ones retry "already_exists" until they give up. Pattern
      # below is create-or-upload: race-loser falls through to upload.
      - name: Upload release assets (macOS)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.channel.outputs.tag }}
          VERSION: ${{ steps.channel.outputs.version }}
          PRERELEASE: ${{ steps.channel.outputs.prerelease }}
          NOTES: ${{ steps.notes.outputs.notes }}
        run: |
          set -e
          if [[ "${{ matrix.platform }}" != macos* ]]; then
            echo "macOS release asset upload does not apply to ${{ matrix.platform }}."
            exit 0
          fi
          # Tauri's macOS bundler emits SignalOS.app.tar.gz without arch
          # suffix, so both matrix archs collide on the same filename in
          # the release. Rename per arch before upload.
          ARCH=$([ "${{ matrix.platform }}" = "macos-arm" ] && echo "aarch64" || echo "x64")
          MACOS_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          for ext in ".app.tar.gz" ".app.tar.gz.sig"; do
            src="$MACOS_DIR/SignalOS${ext}"
            dst="$MACOS_DIR/SignalOS_${VERSION}_${ARCH}${ext}"
            [ -f "$src" ] && mv "$src" "$dst"
          done
          FILES=( src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg \
                  src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz \
                  src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig )
          # Drop unmatched globs (e.g. .sig absent before this run produced them).
          REAL=(); for f in "${FILES[@]}"; do [ -f "$f" ] && REAL+=( "$f" ); done
          PRE=""; [ "$PRERELEASE" = "true" ] && PRE="--prerelease"
          if ! gh release create "$TAG" --title "$TAG" --notes "$NOTES" $PRE "${REAL[@]}" 2>/dev/null; then
            gh release upload "$TAG" "${REAL[@]}" --clobber
          fi

      - name: Upload release assets (Windows)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.channel.outputs.tag }}
          PRERELEASE: ${{ steps.channel.outputs.prerelease }}
          NOTES: ${{ steps.notes.outputs.notes }}
        run: |
          set -e
          if [ "${{ matrix.platform }}" != "windows" ]; then
            echo "Windows release asset upload does not apply to ${{ matrix.platform }}."
            exit 0
          fi
          FILES=( src-tauri/target/release/bundle/nsis/*.exe \
                  src-tauri/target/release/bundle/nsis/*.exe.sig \
                  src-tauri/target/release/bundle/msi/*.msi \
                  src-tauri/target/release/bundle/msi/*.msi.sig )
          REAL=(); for f in "${FILES[@]}"; do [ -f "$f" ] && REAL+=( "$f" ); done
          PRE=""; [ "$PRERELEASE" = "true" ] && PRE="--prerelease"
          if ! gh release create "$TAG" --title "$TAG" --notes "$NOTES" $PRE "${REAL[@]}" 2>/dev/null; then
            gh release upload "$TAG" "${REAL[@]}" --clobber
          fi

      - name: Upload release assets (Linux)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.channel.outputs.tag }}
          PRERELEASE: ${{ steps.channel.outputs.prerelease }}
          NOTES: ${{ steps.notes.outputs.notes }}
        run: |
          set -e
          if [ "${{ matrix.platform }}" != "linux" ]; then
            echo "Linux release asset upload does not apply to ${{ matrix.platform }}."
            exit 0
          fi
          FILES=( src-tauri/target/release/bundle/appimage/*.AppImage \
                  src-tauri/target/release/bundle/appimage/*.AppImage.sig \
                  src-tauri/target/release/bundle/deb/*.deb )
          REAL=(); for f in "${FILES[@]}"; do [ -f "$f" ] && REAL+=( "$f" ); done
          PRE=""; [ "$PRERELEASE" = "true" ] && PRE="--prerelease"
          if ! gh release create "$TAG" --title "$TAG" --notes "$NOTES" $PRE "${REAL[@]}" 2>/dev/null; then
            gh release upload "$TAG" "${REAL[@]}" --clobber
          fi

  # ── Update manifests (stable + beta) ─────────────────────────────────────
  publish-manifest:
    name: Publish update manifest
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Extract version + channel
        id: meta
        shell: bash
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            TAG="v${INPUT_VERSION#v}"
          else
            TAG="${GITHUB_REF_NAME:-v0.0.0}"
          fi
          V="${TAG#v}"
          echo "version=$V" >> $GITHUB_OUTPUT
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "date=$DATE"  >> $GITHUB_OUTPUT
          if [[ "$TAG" =~ -[a-zA-Z] ]] || [[ "$TAG" == v0.* ]] || [[ "${{ github.event.inputs.channel }}" == "beta" ]]; then
            echo "channel=beta"   >> $GITHUB_OUTPUT
          else
            echo "channel=stable" >> $GITHUB_OUTPUT
          fi

      # ── Fetch .sig files from the GitHub Release assets ──────────────────
      # Previous implementation hit a non-existent /releases/tags/$TAG/assets
      # endpoint and had a Python-in-bash-heredoc indentation bug, so every
      # signature came back empty. Using `gh release download` instead.
      - name: Fetch release signatures
        id: sigs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -e
          TAG="v${{ steps.meta.outputs.version }}"
          mkdir -p sigs
          # Download all .sig assets from the release. --clobber overwrites
          # if a previous step staged anything.
          gh release download "$TAG" --pattern '*.sig' --dir sigs --clobber

          read_sig() {
            local file="$1"
            if [ -f "$file" ]; then cat "$file"; fi
          }

          # Match against produced filenames (after the macOS arch-rename step).
          SIG_MAC_ARM=$(read_sig "sigs/SignalOS_${{ steps.meta.outputs.version }}_aarch64.app.tar.gz.sig")
          SIG_MAC_X64=$(read_sig "sigs/SignalOS_${{ steps.meta.outputs.version }}_x64.app.tar.gz.sig")
          SIG_WIN=$(read_sig    "sigs/SignalOS_${{ steps.meta.outputs.version }}_x64-setup.exe.sig")
          SIG_LIN=$(read_sig    "sigs/SignalOS_${{ steps.meta.outputs.version }}_amd64.AppImage.sig")

          # Sig contents may be multi-line; use heredoc form for $GITHUB_OUTPUT.
          {
            echo "mac_arm<<__SIG_EOF__"; echo "$SIG_MAC_ARM"; echo "__SIG_EOF__"
            echo "mac_x64<<__SIG_EOF__"; echo "$SIG_MAC_X64"; echo "__SIG_EOF__"
            echo "win<<__SIG_EOF__";     echo "$SIG_WIN";     echo "__SIG_EOF__"
            echo "lin<<__SIG_EOF__";     echo "$SIG_LIN";     echo "__SIG_EOF__"
          } >> "$GITHUB_OUTPUT"

      # ── Extract release notes for manifest ───────────────────────────────
      - name: Extract notes snippet
        id: notes
        shell: bash
        run: |
          V="${{ steps.meta.outputs.version }}"
          NOTES=$(awk "/^## \[$V\]/{found=1; next} found && /^## /{exit} found{print}" CHANGELOG.md 2>/dev/null || true)
          NOTES="${NOTES:-SignalOS v$V}"
          NOTES_LINE=$(echo "$NOTES" | head -3 | tr '\n' ' ' | sed 's/["\]/\\&/g')
          echo "line=$NOTES_LINE" >> $GITHUB_OUTPUT

      # ── Write stable manifest ─────────────────────────────────────────────
      - name: Write latest.json
        run: |
          if [ "${{ steps.meta.outputs.channel }}" != "stable" ]; then
            echo "latest.json is only written for stable releases."
            exit 0
          fi
          V="${{ steps.meta.outputs.version }}"
          DATE="${{ steps.meta.outputs.date }}"
          NOTES="${{ steps.notes.outputs.line }}"
          cat > distribution/update-manifest/latest.json << EOF
          {
            "version": "$V",
            "notes":   "$NOTES",
            "pub_date": "$DATE",
            "platforms": {
              "darwin-aarch64": {
                "url":       "https://github.com/${GITHUB_REPOSITORY}/releases/download/v$V/SignalOS_${V}_aarch64.app.tar.gz",
                "signature": "${{ steps.sigs.outputs.mac_arm }}"
              },
              "darwin-x86_64": {
                "url":       "https://github.com/${GITHUB_REPOSITORY}/releases/download/v$V/SignalOS_${V}_x64.app.tar.gz",
                "signature": "${{ steps.sigs.outputs.mac_x64 }}"
              },
              "windows-x86_64": {
                "url":       "https://github.com/${GITHUB_REPOSITORY}/releases/download/v$V/SignalOS_${V}_x64-setup.exe",
                "signature": "${{ steps.sigs.outputs.win }}"
              },
              "linux-x86_64": {
                "url":       "https://github.com/${GITHUB_REPOSITORY}/releases/download/v$V/SignalOS_${V}_amd64.AppImage",
                "signature": "${{ steps.sigs.outputs.lin }}"
              }
            }
          }
          EOF

      # ── Write beta manifest ───────────────────────────────────────────────
      - name: Write beta.json
        run: |
          if [ "${{ steps.meta.outputs.channel }}" != "beta" ]; then
            echo "beta.json is only written for beta releases."
            exit 0
          fi
          V="${{ steps.meta.outputs.version }}"
          DATE="${{ steps.meta.outputs.date }}"
          NOTES="${{ steps.notes.outputs.line }}"
          cat > distribution/update-manifest/beta.json << EOF
          {
            "version": "$V",
            "notes":   "$NOTES",
            "pub_date": "$DATE",
            "platforms": {
              "darwin-aarch64": {
                "url":       "https://github.com/${GITHUB_REPOSITORY}/releases/download/v$V/SignalOS_${V}_aarch64.app.tar.gz",
                "signature": "${{ steps.sigs.outputs.mac_arm }}"
              },
              "darwin-x86_64": {
                "url":       "https://github.com/${GITHUB_REPOSITORY}/releases/download/v$V/SignalOS_${V}_x64.app.tar.gz",
                "signature": "${{ steps.sigs.outputs.mac_x64 }}"
              },
              "windows-x86_64": {
                "url":       "https://github.com/${GITHUB_REPOSITORY}/releases/download/v$V/SignalOS_${V}_x64-setup.exe",
                "signature": "${{ steps.sigs.outputs.win }}"
              },
              "linux-x86_64": {
                "url":       "https://github.com/${GITHUB_REPOSITORY}/releases/download/v$V/SignalOS_${V}_amd64.AppImage",
                "signature": "${{ steps.sigs.outputs.lin }}"
              }
            }
          }
          EOF

      - name: Commit manifests
        run: |
          set -e
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add distribution/update-manifest/
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git commit -m "chore: update manifests to v${{ steps.meta.outputs.version }} [${{ steps.meta.outputs.channel }}]"
          # Tags check out in detached-HEAD state — push explicitly to main
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Manifest push failed on attempt ${attempt}; retrying after refresh."
            git fetch origin main
            git rebase origin/main
            sleep $((attempt * 10))
          done
          git push origin HEAD:main
