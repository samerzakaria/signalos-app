# windows-installer.yml — on-demand NSIS installer build for internal testing.
#
# Use this when you want a downloadable .exe to install on a Windows
# machine without setting up the Rust toolchain + Python + PyInstaller
# locally. The release.yml workflow handles full releases (all platforms,
# tag-driven); this one is the lightweight "I need a Windows installer
# now" path.
#
# Trigger:
#   - workflow_dispatch — hit "Run workflow" on the Actions tab.
#
# Output:
#   The run's Artifacts section will contain:
#     - SignalOS-windows-installer-<short-sha>.zip
#         contains: SignalOS_<version>_x64-setup.exe + attestation JSON
#
# Wall time: ~12-18 minutes (Rust release compile + sidecar PyInstaller).

name: windows-installer

on:
  workflow_dispatch:
    inputs:
      builder_email:
        description: "Email written into the attestation file (defaults to noreply@signalos.app)"
        required: false
        default: "noreply@signalos.app"

permissions:
  contents: read

jobs:
  build:
    name: Build NSIS installer on windows-2025
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0   # build-internal.ps1 reads git log + clean state

      - name: Identity for attestation
        shell: pwsh
        run: |
          git config user.name  "SignalOS CI"
          git config user.email "${{ inputs.builder_email }}"

      # Rust toolchain (stable). dtolnay/rust-toolchain pins the
      # minimum effort: ~30s warm cache; ~1m cold.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Tauri CLI + PyInstaller
        shell: pwsh
        run: |
          cargo install tauri-cli --version "^2.0" --locked
          python -m pip install --upgrade pip pyinstaller

      - name: Install npm deps + build frontend bundle
        shell: pwsh
        run: |
          npm install
          npm run build  # vite build emits dist/ which Tauri bundles

      - name: Bundle the Python sidecar
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass `
            -File scripts\bundle-sidecar.ps1

      - name: Build NSIS installer (build-internal.ps1 produces the attestation too)
        shell: pwsh
        env:
          SIGNALOS_BUILDER_EMAIL: ${{ inputs.builder_email }}
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass `
            -File scripts\build-internal.ps1

      - name: Collect artifacts (installer + attestation)
        shell: pwsh
        run: |
          $ShortSha = (git rev-parse --short HEAD).Trim()
          $StageDir = "artifact-stage"
          New-Item -ItemType Directory -Force -Path $StageDir | Out-Null
          # NSIS .exe
          Get-ChildItem "src-tauri\target\release\bundle\nsis\*.exe" |
            ForEach-Object { Copy-Item $_.FullName $StageDir }
          # Attestation JSON written by build-internal.ps1
          if (Test-Path "distribution\internal") {
            Get-ChildItem "distribution\internal\*.json" |
              ForEach-Object { Copy-Item $_.FullName $StageDir }
          }
          Write-Host "Staged artifacts:"
          Get-ChildItem $StageDir | ForEach-Object { Write-Host "  $($_.Name) ($($_.Length) bytes)" }

      - name: Upload installer + attestation as a single zipped artifact
        uses: actions/upload-artifact@v7
        with:
          name: SignalOS-windows-installer-${{ github.sha }}
          path: artifact-stage/
          if-no-files-found: error
          retention-days: 14
