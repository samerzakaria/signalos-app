# Wave 5 / G4 - Test Automation CI workflow
#
# Runs the on-PR and on-push gates defined in docs/test-automation/.
# Mirrors scripts/test-gates.* and adds the matrix runs that only make
# sense in CI.
#
# Failure of any job blocks merge when configured in branch protection.

name: test-automation

on:
  push:
    branches: ['**']
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  l0-precommit:
    name: L0 pre-commit gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config
      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
      - name: Ensure sidecar binary exists for target
        run: bash scripts/ensure-sidecar.sh
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python sidecar deps
        shell: bash
        run: python -m pip install "pyyaml>=6.0,<7" "pytest>=9.0,<10"
      - name: Validate Tauri command ACL
        run: python scripts/validate-tauri-acl.py
      - name: cargo fmt check
        working-directory: src-tauri
        run: cargo fmt --check
      - name: cargo clippy (-D warnings)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
      - name: Validate RustSec exception policy
        run: python scripts/validate-rustsec-exceptions.py --cargo-dir src-tauri
      - name: cargo audit policy
        working-directory: src-tauri
        run: |
          cargo install --quiet cargo-audit --locked
          cargo audit --deny warnings
      - name: secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
      - name: secret scan (regex fallback)
        run: bash scripts/test-gates.sh L0
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: npm install
        run: npm install
      - name: typecheck (tsc --noEmit)
        run: npm run typecheck

  l1-sandbox-integration:
    name: L1 sandbox integration Docker
    needs: l0-precommit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Verify Docker is available on the runner
        run: |
          docker --version
          docker info --format '{{.ServerVersion}}'
      - name: Pre-pull alpine
        run: docker pull alpine:latest
      - name: Run sandbox integration tests
        working-directory: python
        run: python -m unittest test_sandbox_integration -v

  l1-build:
    name: L1 build and verify
    needs: l0-precommit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-2025, macos-latest ]
    steps:
      - uses: actions/checkout@v4
      - name: Install platform system deps
        shell: bash
        run: |
          if [ "$RUNNER_OS" != "Linux" ]; then
            echo "No platform system deps required for $RUNNER_OS."
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config
      - uses: actions-rs/toolchain@v1
        with: { toolchain: stable }
      - name: Ensure sidecar binary exists for target
        shell: bash
        run: bash scripts/ensure-sidecar.sh
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install Python sidecar deps
        shell: bash
        run: python -m pip install "pyyaml>=6.0,<7" "pytest>=9.0,<10"
      - name: cargo check (all targets)
        working-directory: src-tauri
        run: cargo check --all-targets
      - name: cargo test --lib
        working-directory: src-tauri
        run: cargo test --lib
      - name: python tests
        working-directory: python
        shell: bash
        run: python -m pytest . --ignore=test_product_live_e2e.py -q
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: npm install and test
        run: |
          npm install
          npm run test
      - name: npm build
        run: npm run build

  l2-installer-smoke:
    name: L2 installer smoke
    needs: l1-build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-2025, macos-latest ]
    steps:
      - uses: actions/checkout@v4
      - name: Install platform system deps
        shell: bash
        run: |
          if [ "$RUNNER_OS" != "Linux" ]; then
            echo "No platform system deps required for $RUNNER_OS."
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config
      - uses: actions-rs/toolchain@v1
        with: { toolchain: stable }
      - name: Ensure sidecar binary exists for target
        shell: bash
        run: bash scripts/ensure-sidecar.sh
      - name: cargo build --release
        working-directory: src-tauri
        run: cargo build --release

  l3-preprod:
    name: L3 pre-prod gates
    needs: l2-installer-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config
      - uses: actions-rs/toolchain@v1
        with: { toolchain: stable }
      - name: Ensure sidecar binary exists for target
        shell: bash
        run: bash scripts/ensure-sidecar.sh
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Install Python sidecar deps
        shell: bash
        run: python -m pip install "pyyaml>=6.0,<7" "pytest>=9.0,<10"
      - name: Install cargo-audit
        run: cargo install --quiet cargo-audit --locked
      - name: Run extended test-gates
        run: bash scripts/test-gates.sh L1
