# Wave 5 / G4 - Test Automation CI workflow
#
# Runs the on-PR and on-push gates defined in docs/test-automation/.
# Mirrors scripts/test-gates.* and adds the matrix runs that only make
# sense in CI.
#
# Failure of any job blocks merge when configured in branch protection.

name: test-automation

on:
  push:
    branches: ['**']
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  l0-precommit:
    name: L0 pre-commit gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Ensure sidecar binary exists for target
        run: bash scripts/ensure-sidecar.sh
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install Python sidecar deps
        shell: bash
        run: python -m pip install "pyyaml>=6.0,<7" "pytest>=9.0,<10" "litellm>=1.40,<2" "anthropic>=0.39,<1.0" "openai>=1.30,<2" "google-generativeai>=0.5,<1"
      - name: Validate Tauri command ACL
        run: python scripts/validate-tauri-acl.py
      - name: cargo fmt check
        working-directory: src-tauri
        run: cargo fmt --check
      - name: cargo clippy (-D warnings)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings
      - name: Validate RustSec exception policy
        run: python scripts/validate-rustsec-exceptions.py --cargo-dir src-tauri
      - name: cargo audit policy
        working-directory: src-tauri
        run: |
          cargo install --quiet cargo-audit --locked
          cargo audit --deny warnings
      - name: secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: secret scan (regex fallback)
        run: bash scripts/test-gates.sh L0
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: npm install
        run: npm install
      - name: typecheck (tsc --noEmit)
        run: npm run typecheck

  l1-sandbox-integration:
    name: L1 sandbox integration Docker
    needs: l0-precommit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - name: Verify Docker is available on the runner
        run: |
          docker --version
          docker info --format '{{.ServerVersion}}'
      - name: Pre-pull alpine
        run: docker pull alpine:latest
      - name: Pre-cache pinned funded dependency image
        shell: bash
        run: |
          image="$(python - <<'PY'
          import json
          from pathlib import Path

          policy = json.loads(
              Path("scripts/backend_matrix/dependencies/policy.json").read_text(
                  encoding="utf-8"
              )
          )
          print(policy["buildImage"])
          PY
          )"
          if [[ ! "$image" =~ ^docker\.io/library/node:[^@]+@sha256:[0-9a-f]{64}$ ]]; then
            echo "Funded dependency image is not digest pinned" >&2
            exit 1
          fi
          docker pull --platform linux/amd64 "$image"
          docker image inspect "$image" >/dev/null
      - name: Pre-cache pinned oracle (Playwright) dependency image
        shell: bash
        run: |
          image="$(python - <<'PY'
          import json
          from pathlib import Path

          policy = json.loads(
              Path("scripts/backend_matrix/dependencies/oracle-policy.json").read_text(
                  encoding="utf-8"
              )
          )
          print(policy["buildImage"])
          PY
          )"
          if [[ ! "$image" =~ ^mcr\.microsoft\.com/playwright:[^@]+@sha256:[0-9a-f]{64}$ ]]; then
            echo "Oracle dependency image is not digest pinned" >&2
            exit 1
          fi
          docker pull --platform linux/amd64 "$image"
          docker image inspect "$image" >/dev/null
      - name: Run sandbox integration tests
        working-directory: python
        run: python -m unittest test_sandbox_integration -v
      - name: Run funded dependency broker Docker integration
        working-directory: python
        timeout-minutes: 25
        env:
          SIGNALOS_RUN_DEPENDENCY_PROXY_INTEGRATION: "1"
        run: |
          test "$SIGNALOS_RUN_DEPENDENCY_PROXY_INTEGRATION" = "1"
          python -m unittest test_dependency_broker_integration -v
      - name: Verify funded dependency Docker cleanup
        if: always()
        shell: bash
        run: |
          endpoint="$(docker context inspect --format '{{json .Endpoints.docker.Host}}' | python -c 'import json,sys; print(json.load(sys.stdin))')"
          containers="$(docker --host "$endpoint" ps -aq \
            --filter label=signalos.owner=dependency-broker \
            --filter label=signalos.scope=funded-dependency)"
          networks="$(docker --host "$endpoint" network ls -q \
            --filter label=signalos.owner=dependency-broker \
            --filter label=signalos.scope=funded-dependency)"
          # Volumes are labelled signalos.scope=funded (sandbox.py volume create);
          # both the funded and the source-blind oracle contexts create them, so a
          # leftover volume is residue too and must fail the run.
          volumes="$(docker --host "$endpoint" volume ls -q \
            --filter label=signalos.scope=funded)"
          if [[ -n "$containers" || -n "$networks" || -n "$volumes" ]]; then
            echo "Funded dependency Docker residue detected" >&2
            echo "containers=$containers" >&2
            echo "networks=$networks" >&2
            echo "volumes=$volumes" >&2
            exit 1
          fi

  l1-build:
    name: L1 build and verify
    needs: l0-precommit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-2025, macos-latest ]
    steps:
      - uses: actions/checkout@v5
      - name: Install platform system deps
        shell: bash
        run: |
          if [ "$RUNNER_OS" != "Linux" ]; then
            echo "No platform system deps required for $RUNNER_OS."
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - name: Ensure sidecar binary exists for target
        shell: bash
        run: bash scripts/ensure-sidecar.sh
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - name: Install Python sidecar deps
        shell: bash
        run: python -m pip install "pyyaml>=6.0,<7" "pytest>=9.0,<10" "litellm>=1.40,<2" "anthropic>=0.39,<1.0" "openai>=1.30,<2" "google-generativeai>=0.5,<1"
      - name: cargo check (all targets)
        working-directory: src-tauri
        run: cargo check --all-targets
      - name: cargo test --lib
        working-directory: src-tauri
        run: cargo test --lib
      - name: Harness readiness gate ($0 -- capability contract + wire-level golden path)
        working-directory: python
        shell: bash
        # Fail-fast, visible check for the class of bug that used to cost a funded
        # LLM build to find: capability detection false-negatives (models get no
        # tools) + the real litellm/tool-call wire path. Offline, seconds.
        run: python -m pytest test_capability_contract.py test_golden_path_e2e.py test_transcript_capture.py -q
      - name: python tests
        working-directory: python
        shell: bash
        # test_backend_matrix_oracle.py drives the Playwright/Chromium browser
        # oracle (scripts/backend_matrix/oracles/expense_tracker.mjs). This step
        # has no browser stack and npm install runs later, so it is excluded
        # here like the live-e2e test; the browser-enabled journey job below
        # runs it after installing Playwright Chromium.
        run: python -m pytest . --ignore=test_product_live_e2e.py --ignore=test_backend_matrix_oracle.py -q
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - name: npm install and test
        run: |
          npm install
          npm run test
      - name: npm build
        run: npm run build

  l1-journey-e2e:
    name: L1 user-journey E2E (cockpit gate)
    needs: l0-precommit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: npm install
        run: npm install
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
      - name: Backend-matrix browser oracle (offline)
        run: |
          python -m pip install "pytest>=9.0,<10"
          python -m pytest python/test_backend_matrix_oracle.py -q
      - name: Build UI
        run: npm run build
      - name: User-journey smoke (launch → onboarding → app boot → views → #53 build guard)
        run: npm run e2e:journey

  l2-installer-smoke:
    name: L2 installer smoke
    needs: [l1-build, l1-sandbox-integration]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-2025, macos-latest ]
    steps:
      - uses: actions/checkout@v5
      - name: Install platform system deps
        shell: bash
        run: |
          if [ "$RUNNER_OS" != "Linux" ]; then
            echo "No platform system deps required for $RUNNER_OS."
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - name: Ensure sidecar binary exists for target
        shell: bash
        run: bash scripts/ensure-sidecar.sh
      - name: cargo build --release
        working-directory: src-tauri
        run: cargo build --release

  l3-preprod:
    name: L3 pre-prod gates
    needs: l2-installer-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Tauri Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            build-essential \
            pkg-config
      - uses: dtolnay/rust-toolchain@stable
      - name: Ensure sidecar binary exists for target
        shell: bash
        run: bash scripts/ensure-sidecar.sh
      - uses: actions/setup-python@v6
        with: { python-version: "3.11" }
      - name: Install Python sidecar deps
        shell: bash
        run: python -m pip install "pyyaml>=6.0,<7" "pytest>=9.0,<10" "litellm>=1.40,<2" "anthropic>=0.39,<1.0" "openai>=1.30,<2" "google-generativeai>=0.5,<1"
      - name: Install cargo-audit
        run: cargo install --quiet cargo-audit --locked
      - name: Run extended test-gates
        run: bash scripts/test-gates.sh L1
