<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SignalOS — Interactive Onboarding</title>
<style>
  /* ─── SignalOS design tokens (single source of truth) ─────────────────────
     These match src/index.html exactly so the tour feels like the app it
     introduces. Add new tokens here AND there together. */
  :root {
    --bg:          #f6f5f2;
    --panel:       #ffffff;
    --panel-soft:  #fbfaf8;
    --line:        #e5e1d8;
    --line-strong: #cfc7b8;
    --text:        #1e1d1a;
    --ink:         #1e1d1a;          /* legacy alias used in the tour */
    --muted:       #68645d;
    --faint:       #8d877e;
    --blue:        #2457d6;
    --blue-dark:   #1742ad;
    --blue-d:      #1742ad;          /* legacy alias */
    --blue-soft:   #e8efff;
    --green:       #27885c;
    --green-soft:  #e7f5ed;
    --amber:       #a86310;
    --amber-soft:  #fff2dc;
    --red:         #b93434;
    --red-soft:    #fee9e7;
    --pink:        #d4318c;
    --aqua:        #1aa6b5;
    --shadow:      0 12px 30px rgba(44, 39, 30, .08);
    --radius:      8px;
    --paper:       #f6f5f2;          /* legacy alias = --bg */
    --card:        #ffffff;          /* legacy alias = --panel */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:ui-rounded,"SF Pro Rounded","Segoe UI Variable",system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#faf7f0 0%,#efe7d9 100%);color:var(--ink);overflow:hidden}
  body{display:grid;place-items:center}
  main{width:min(1240px,98vw);height:min(820px,96vh);display:grid;grid-template-columns:240px 1fr;gap:18px}

  /* Step rail */
  aside.rail{
    background:var(--card);border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:18px 12px;overflow-y:auto;
    display:flex;flex-direction:column;gap:6px;
  }
  .rail-brand{display:flex;align-items:center;gap:10px;padding:6px 6px 14px 6px;font-weight:800}
  .rail-brand-mark{width:32px;height:32px;background:var(--blue);border-radius:8px;display:grid;place-items:center}
  .rail-brand-mark svg{width:26px;height:26px}
  .rail-group{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);padding:10px 8px 4px}
  .rail-step{
    display:grid;grid-template-columns:22px 1fr;gap:8px;
    border:0;background:transparent;cursor:pointer;
    padding:8px 10px;border-radius:10px;
    text-align:left;font:inherit;color:var(--muted);font-size:13px;line-height:1.2;
    transition:background .15s,color .15s;
  }
  .rail-step:hover{background:#f4f1e8;color:var(--ink)}
  .rail-step.done{color:var(--ink)}
  .rail-step.done .rail-num{background:var(--green);color:#fff;border-color:var(--green)}
  .rail-step.now{background:var(--blue-soft);color:var(--ink);font-weight:700}
  .rail-step.now .rail-num{background:var(--blue);color:#fff;border-color:var(--blue)}
  .rail-num{
    width:22px;height:22px;border-radius:50%;
    border:1.5px solid var(--line);
    display:grid;place-items:center;font-size:11px;font-weight:800;color:var(--faint);
  }

  /* Stage */
  section.stage{position:relative}
  .slide{
    position:absolute;inset:0;display:grid;grid-template-rows:auto 1fr auto;
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    opacity:0;transform:scale(.97) translateY(6px);pointer-events:none;
    transition:opacity .35s ease,transform .35s ease;
    overflow:hidden;
  }
  .slide.active{opacity:1;transform:none;pointer-events:auto}
  header.bar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--line)}
  .bar-title{font-weight:800;font-size:16px}
  .bar-step{color:var(--faint);font-size:12px}
  footer.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-top:1px solid var(--line)}
  .content{padding:26px 36px;overflow:auto}

  h1{font-size:clamp(24px,3.2vw,36px);line-height:1.1;margin-bottom:6px}
  h2{font-size:clamp(18px,2.2vw,24px);margin-bottom:6px}
  .sub{color:var(--muted);font-size:15px;margin-bottom:14px}
  .fine{color:var(--faint);font-size:12px}

  /* Buttons match src/index.html .primary / .secondary / .ghost exactly:
     same min-height, padding, radius, font-weight, hover treatment. */
  .btn{
    min-height:44px;border:1px solid transparent;border-radius:var(--radius);
    padding:0 16px;font:inherit;font-weight:760;font-size:14px;
    cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;
    transition:transform .12s,background .2s,border-color .2s,color .2s;
  }
  .btn:active{transform:scale(.97)}
  .btn-primary{background:var(--blue);color:#fff}
  .btn-primary:hover{background:var(--blue-dark)}
  .btn-ghost{background:transparent;color:var(--muted)}
  .btn-ghost:hover{background:var(--panel-soft);color:var(--text)}
  .btn-danger{background:var(--red);color:#fff}
  .btn:disabled{opacity:.55;cursor:not-allowed}

  .kbd{display:inline-block;padding:2px 6px;border-radius:5px;background:#f0eee8;border:1px solid var(--line);font-family:ui-monospace,monospace;font-size:11px}

  /* Cover */
  .cover{display:grid;place-items:center;height:100%;text-align:center;padding:0 36px}
  .hero{font-size:clamp(34px,5vw,58px);line-height:1.05;font-weight:900;background:linear-gradient(135deg,var(--blue) 0,var(--aqua) 55%,var(--pink) 100%);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:14px}
  .hero-sub{color:var(--muted);font-size:18px;max-width:660px;margin:0 auto 22px}
  .cover-icons{display:flex;gap:18px;margin:24px 0;font-size:32px}

  /* Provider */
  .provider-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0}
  .provider-chip{padding:10px 8px;border:2px solid var(--line);border-radius:12px;background:#fff;text-align:center;font-weight:700;font-size:12px;cursor:pointer;transition:border-color .15s,background .15s}
  .provider-chip:hover{border-color:var(--blue)}
  .provider-chip.selected{border-color:var(--blue);background:var(--blue-soft)}
  .provider-emoji{font-size:24px;display:block;margin-bottom:4px}
  .test-ping{padding:12px;border-radius:10px;background:var(--green-soft);color:var(--green);font-weight:700;margin-top:12px;display:none}
  .test-ping.show{display:block}

  /* Prompt textarea */
  .input{
    width:100%;border:1px solid var(--line-strong);border-radius:var(--radius);
    background:#fff;color:var(--text);padding:10px 11px;font:inherit;font-size:14px;min-height:42px;
  }
  .input:focus{outline:2px solid #c9d8ff;border-color:var(--blue)}
  .prompt-area{min-height:120px;resize:vertical;line-height:1.5}

  /* Intent / Design cards */
  .entity-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}
  .entity-card{padding:14px;border:2px solid var(--line);border-radius:12px;background:#fbfaf7;cursor:pointer;transition:border-color .15s,background .15s}
  .entity-card:hover{border-color:var(--blue)}
  .entity-card.selected{border-color:var(--blue);background:var(--blue-soft)}
  .entity-title{font-weight:800;font-size:14px;margin-bottom:4px}
  .entity-desc{color:var(--muted);font-size:12px}
  .entity-tag{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;margin-top:6px}
  .entity-tag.ent{background:var(--blue-soft);color:var(--blue)}
  .entity-tag.wf{background:var(--green-soft);color:var(--green)}
  .entity-tag.surf{background:var(--amber-soft);color:var(--amber)}

  /* Design choices */
  .design-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
  .design-card{border:2px solid var(--line);border-radius:12px;padding:16px;background:#fbfaf7}
  .design-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin-bottom:6px}
  .design-value{font-weight:800;font-size:16px}
  .design-sub{color:var(--muted);font-size:12px;margin-top:4px}
  .color-row{display:flex;gap:8px;margin-top:8px}
  .color-swatch{width:28px;height:28px;border-radius:8px;border:2px solid var(--line)}

  /* Progress phases */
  .progress-stage{display:grid;grid-template-columns:1fr 1fr;gap:24px;height:100%;align-items:center}
  .phase-list{display:grid;gap:10px}
  .phase-row{display:grid;grid-template-columns:32px 1fr auto;gap:10px;align-items:center;padding:10px 14px;border-radius:12px;border:2px solid var(--line);background:#fbfaf7;opacity:0;transform:translateX(-10px);transition:opacity .35s,transform .35s,border-color .3s,background .3s}
  .phase-row.in{opacity:1;transform:none}
  .phase-row.active{border-color:var(--blue);background:var(--blue-soft)}
  .phase-row.done{border-color:var(--green);background:var(--green-soft)}
  .phase-icon{font-size:20px}
  .phase-name{font-weight:700;font-size:14px}
  .phase-sub{font-size:11px;color:var(--muted)}
  .phase-status{font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px}
  .phase-status.waiting{background:var(--line);color:var(--faint)}
  .phase-status.running{background:var(--blue-soft);color:var(--blue)}
  .phase-status.complete{background:var(--green-soft);color:var(--green)}
  .signaloid{width:200px;height:200px;display:grid;place-items:center;background:radial-gradient(circle at 30% 30%,#e8efff,#b9c8ee);border-radius:50%;animation:think 2.4s ease-in-out infinite;margin:0 auto}
  .signaloid svg{width:120px;height:120px}
  @keyframes think{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-5px) scale(1.03)}}

  /* Closeout card */
  .closeout-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:14px}
  .closeout-card{padding:16px;border:2px solid var(--line);border-radius:12px;background:#fbfaf7}
  .closeout-card.green{border-color:var(--green);background:var(--green-soft)}
  .closeout-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin-bottom:4px}
  .closeout-value{font-weight:800;font-size:15px}

  /* Open product */
  .open-stage{display:grid;grid-template-columns:1fr 1fr;gap:24px;height:100%;align-items:center}
  .repo-card{padding:24px;border:3px solid var(--green);border-radius:18px;background:var(--green-soft);text-align:center}
  .repo-emoji{font-size:64px;margin-bottom:12px}

  /* Gate sign */
  .sign-stage{display:grid;place-items:center;height:100%;gap:18px;padding:24px}
  .gate-row{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
  .gate{width:90px;height:90px;border-radius:18px;display:grid;place-items:center;background:#f4f1e8;border:3px dashed var(--line);transition:background .3s,border-color .3s,transform .3s;position:relative;cursor:pointer}
  .gate.signed{background:var(--green-soft);border:3px solid var(--green);transform:scale(1.04)}
  .gate.blocked{background:var(--red-soft);border:3px solid var(--red);cursor:not-allowed}
  .gate-name{position:absolute;bottom:-22px;font-weight:700;font-size:11px}
  .gate-check{width:46px;height:46px;opacity:0;transition:opacity .3s}
  .gate.signed .gate-check{opacity:1}
  .role-banner{padding:10px 14px;background:var(--blue-soft);border:1px solid var(--blue);border-radius:10px;color:var(--blue);font-weight:700;font-size:13px}
  .seal{width:140px;height:140px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 30% 30%,#b9eccc,var(--green));color:#fff;font-weight:900;font-size:20px;box-shadow:0 12px 32px rgba(39,136,92,.4);opacity:0;transform:scale(.4);transition:opacity .5s,transform .5s cubic-bezier(.35,1.4,.5,1);text-align:center}
  .seal.in{opacity:1;transform:none}
  .seal-small{font-size:11px;font-weight:700;margin-top:4px}

  /* Verdict picker */
  .verdict-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:14px}
  .verdict-card{padding:14px 10px;border:2px solid var(--line);border-radius:12px;background:#fbfaf7;text-align:center;cursor:pointer;transition:border-color .15s,background .15s,transform .15s}
  .verdict-card:hover{transform:translateY(-2px);border-color:var(--blue)}
  .verdict-card.selected{border-color:var(--blue);background:var(--blue-soft)}
  .verdict-emoji{font-size:28px;display:block;margin-bottom:6px}
  .verdict-name{font-weight:800;font-size:12px}
  .verdict-desc{font-size:10px;color:var(--muted);margin-top:4px}

  /* Trust tiers */
  .tier-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:14px}
  .tier-card{padding:18px;border:3px solid var(--line);border-radius:14px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s,transform .15s}
  .tier-card:hover{transform:translateY(-3px)}
  .tier-card.selected{border-color:var(--blue);background:var(--blue-soft)}
  .tier-emoji{font-size:36px}
  .tier-name{font-weight:800;font-size:16px;margin:8px 0 4px}
  .tier-desc{color:var(--muted);font-size:12px}

  /* Security */
  .security-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
  .security-card{padding:14px;border:2px solid var(--line);border-radius:12px;background:#fbfaf7}
  .security-icon{font-size:24px;margin-bottom:6px}
  .security-title{font-weight:800;font-size:14px;margin-bottom:4px}
  .security-desc{color:var(--muted);font-size:12px}
  .security-status{margin-top:8px;font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;display:inline-block}
  .security-status.pass{background:var(--green-soft);color:var(--green)}
  .security-status.warn{background:var(--amber-soft);color:var(--amber)}

  /* Audit reveal */
  .audit-card{background:#1e1d1a;color:#a8e9b8;border-radius:14px;padding:16px;font-family:ui-monospace,monospace;font-size:11px;line-height:1.6;border:2px solid #2a2925;overflow:auto;max-height:380px}
  .audit-line{opacity:0;transform:translateY(6px);transition:opacity .25s,transform .25s}
  .audit-line.in{opacity:1;transform:none}

  /* Dashboard */
  .dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:14px}
  .dash-card{padding:18px;border:2px solid var(--line);border-radius:12px;background:#fbfaf7;text-align:center}
  .dash-num{font-size:32px;font-weight:900;color:var(--blue)}
  .dash-label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-top:4px}
  .burndown-bar{height:18px;background:var(--line);border-radius:99px;overflow:hidden;margin-top:14px}
  .burndown-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--aqua));transition:width 1s ease;border-radius:99px}

  /* Chat */
  .chat-stage{display:grid;grid-template-columns:1fr 200px;gap:18px;height:100%}
  .chat-messages{background:#1e1d1a;border-radius:14px;padding:16px;font-family:ui-monospace,monospace;font-size:12px;line-height:1.6;border:2px solid #2a2925;overflow:auto;color:#f0eee8;display:flex;flex-direction:column;gap:8px}
  .chat-msg{padding:8px 12px;border-radius:10px;max-width:90%}
  .chat-msg.user{background:var(--blue);color:#fff;align-self:flex-end}
  .chat-msg.ai{background:#2a2925;color:#e0ddd6;align-self:flex-start}
  .chat-msg.cmd{background:#2a2925;color:var(--aqua);font-weight:700;align-self:flex-start;border:1px solid var(--aqua)}
  .chat-sidebar{display:flex;flex-direction:column;gap:8px}
  .chat-sidebar-item{padding:10px;border:1px solid var(--line);border-radius:10px;font-size:12px;background:#fbfaf7;transition:border-color .15s,background .15s}
  .chat-sidebar-item.active{border-color:var(--blue);background:var(--blue-soft);font-weight:700}

  /* Files and preview */
  .files-stage{display:grid;grid-template-columns:1fr 1.3fr;gap:24px;height:100%}
  .file-tree-card{background:#f8f6f0;border-radius:18px;padding:14px;border:2px solid var(--line);overflow-y:auto}
  .file-tree-card h3{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px}
  .file-row{display:grid;grid-template-columns:24px 1fr auto;gap:6px;align-items:center;padding:8px;border-radius:8px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;opacity:0;transform:translateY(6px);transition:opacity .3s,transform .3s,background .15s;cursor:pointer}
  .file-row.in{opacity:1;transform:none}
  .file-row:hover{background:#ede9dd}
  .file-row.selected{background:var(--blue-soft)}
  .file-emoji{font-size:16px}
  .file-badge{font-size:9px;padding:2px 7px;border-radius:99px;font-weight:800}
  .file-badge.new{background:var(--green-soft);color:var(--green)}
  .file-badge.mod{background:var(--amber-soft);color:var(--amber)}
  .file-badge.pass{background:var(--green-soft);color:var(--green)}
  .file-peek{background:#1e1d1a;color:#f0eee8;border-radius:18px;padding:18px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.6;white-space:pre-wrap;word-break:break-word;overflow:auto;height:100%;border:2px solid #2a2925}
  .file-peek-empty{color:#968f82;font-style:italic}
  .demo-wrap{border:3px solid var(--line);border-radius:18px;overflow:hidden;background:#fff;position:relative;height:100%}
  .demo-frame{width:100%;height:100%;border:0;display:block;min-height:320px}
  .demo-chrome{background:#f4f1e8;padding:6px 10px;border-bottom:1px solid var(--line);display:flex;gap:6px;align-items:center}
  .demo-dot{width:9px;height:9px;border-radius:50%}
  .demo-dot.r{background:#e87878}.demo-dot.y{background:#e8c878}.demo-dot.g{background:#78c89a}
  .demo-addr{margin-left:10px;color:var(--muted);font-size:11px;font-family:ui-monospace,monospace}

  /* Secrets */
  .secret-row{display:grid;grid-template-columns:1fr auto;gap:8px;padding:10px;background:#fff;border:1px solid var(--line);border-radius:10px;margin-bottom:6px}
  .secret-name{font-family:ui-monospace,monospace;font-weight:700;font-size:13px}
  .secret-mask{color:var(--muted);font-family:ui-monospace,monospace;font-size:12px}
  .secret-btns{display:flex;gap:4px}
  .secret-btn{padding:4px 8px;background:transparent;border:1px solid var(--line);border-radius:6px;font:inherit;font-size:10px;cursor:pointer}
  .env-diff{margin-top:14px;padding:14px;border:2px solid var(--line);border-radius:12px;background:#fbfaf7}
  .env-diff-row{display:grid;grid-template-columns:30px 1fr;gap:8px;padding:4px 8px;font-family:ui-monospace,monospace;font-size:12px;border-radius:4px}
  .env-diff-row.add{color:var(--green);background:var(--green-soft)}
  .env-diff-row.rem{color:var(--red);background:var(--red-soft)}
  .env-diff-row.same{color:var(--faint)}

  /* Test debt */
  .debt-entry{padding:10px 12px;background:#fff;border:1px solid var(--line);border-radius:8px;margin-bottom:6px}
  .debt-title{font-weight:700;font-size:13px}
  .debt-meta{color:var(--faint);font-size:11px;margin-top:2px}
  .mutation-card{padding:20px;background:var(--amber-soft);border:2px solid var(--amber);border-radius:var(--radius);margin-top:14px}
  .mutation-bar{height:14px;background:#fff;border-radius:99px;overflow:hidden;margin:10px 0}
  .mutation-fill{height:100%;background:linear-gradient(90deg,var(--amber),var(--green));transition:width .8s ease}

  /* Override modal */
  .override-modal{position:absolute;inset:0;background:rgba(20,18,14,.6);display:none;place-items:center;border-radius:var(--radius)}
  .override-modal.show{display:grid}
  .override-card{background:#fff;border-radius:14px;padding:20px;width:380px;max-width:90%}
  .override-card h3{margin-bottom:8px}
  .diff-confirm-row{margin-top:12px;display:flex;justify-content:flex-end;gap:8px}

  /* Done */
  .done-stage{display:grid;place-items:center;height:100%;text-align:center;padding:0 36px}
  .done-icons{font-size:32px;margin-bottom:18px}
  .done-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}
  .done-stat{padding:14px;border:1px solid var(--line);border-radius:12px;background:#fbfaf7}
  .done-num{font-size:28px;font-weight:900;color:var(--blue)}
  .done-label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)}

  @media (max-width:900px){
    main{grid-template-columns:1fr;height:100vh;width:100vw;gap:0}
    aside.rail{display:none}
    .slide{border-radius:0}
    .progress-stage,.files-stage,.open-stage,.chat-stage{grid-template-columns:1fr}
    .entity-grid,.provider-grid,.verdict-grid,.tier-grid,.security-grid,.design-grid,.dash-grid,.closeout-grid{grid-template-columns:1fr 1fr}
  }
</style>
</head>
<body>
<main>

  <!-- ─── Step rail ─── -->
  <aside class="rail" id="rail">
    <div class="rail-brand">
      <div class="rail-brand-mark">
        <svg viewBox="0 0 64 64">
          <path d="M11 47 L26 33 L42 38 L54 18" fill="none" stroke="#dce7ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M11 47 L26 33 L42 38 L54 18" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

    lastGroup = s.group;
  }
  var btn = document.createElement("button");
  btn.className = "rail-step" + (idx === 0 ? " now" : "");
  btn.dataset.idx = String(idx);
  btn.innerHTML = '<span class="rail-num">' + (idx + 1) + '</span><span>' + s.title + '</span>';
  btn.addEventListener("click", function() { go(idx); });
  rail.appendChild(btn);
});

// ─── Build stage (1 slide DOM per spec) ─────────────────────────────────────
var stage = document.getElementById("stage");
var tpl = document.getElementById("t-slide");
var slideEls = SLIDES.map(function(s, idx) {
  var node = tpl.content.cloneNode(true).querySelector(".slide");
  node.dataset.idx = String(idx);

  node.querySelector(".content").innerHTML = renderSlide(s.id);
  stage.appendChild(node);
  return node;
});

// ─── Navigation ──────────────────────────────────────────────────────────────
function go(idx) {
  if (idx < 0 || idx >= SLIDES.length) return;
  slideEls[state.current].classList.remove("active");
  state.current = idx;
  state.visited.add(idx);
  slideEls[idx].classList.add("active");
  refreshRail();
  onEnter(SLIDES[idx].id);
}
function refreshRail() {
  document.querySelectorAll(".rail-step").forEach(function(b) {
    var idx = Number(b.dataset.idx);
    b.classList.toggle("now", idx === state.current);
    b.classList.toggle("done", state.visited.has(idx) && idx !== state.current);
  });
}
document.addEventListener("click", function(e) {
  if (e.target.matches("[data-next]")) {
    if (state.current >= SLIDES.length - 1) restartTour();
    else go(state.current + 1);
  } else if (e.target.matches("[data-prev]")) {
    go(state.current - 1);
  }
});
document.addEventListener("keydown", function(e) {
  if (e.target.matches("input,textarea")) return;
  if (e.key === "ArrowRight") go(state.current + 1);
  if (e.key === "ArrowLeft") go(state.current - 1);
  if (e.key === "Home") go(0);
  if (e.key === "End") go(SLIDES.length - 1);
});

// ─── Slide enter handlers ────────────────────────────────────────────────────
function onEnter(id) {
  switch (id) {
    case "ai":          wireAI(); break;
    case "describe":    wireDescribe(); break;
    case "intent":      wireIntent(); break;
    case "design":      wireDesign(); break;
    case "progress":    wireProgress(); break;
    case "openproduct": wireOpenProduct(); break;
    case "gates":       wireGates(); break;
    case "verdicts":    wireVerdicts(); break;
    case "tiers":       wireTiers(); break;
    case "audit":       wireAudit(); break;
    case "chat":        wireChat(); break;
    case "files":       wireFiles(); break;
    case "secrets":     wireSecrets(); break;
    case "testdebt":    wireTestDebt(); break;
    case "done":        wireDone(); break;
  }
}

function wireProgress() {
  var phases = qa(".phase-row");
  var timers = [];
  function resetPhases() {
    timers.forEach(function(t) { clearTimeout(t); });
    timers = [];
    state.progressPhase = -1;
    phases.forEach(function(p) {
      p.classList.remove("in", "active", "done");
      var st = p.querySelector(".phase-status");
      if (st) { st.className = "phase-status waiting"; st.textContent = "waiting"; }
    });
  }
  function playPhases() {
    resetPhases();
    phases.forEach(function(p, i) {
      timers.push(setTimeout(function() {
        p.classList.add("in");
      }, i * 100));
      timers.push(setTimeout(function() {
        // mark previous done
        if (i > 0) {
          phases[i - 1].classList.remove("active");
          phases[i - 1].classList.add("done");
          var prevSt = phases[i - 1].querySelector(".phase-status");
          if (prevSt) { prevSt.className = "phase-status complete"; prevSt.textContent = "complete"; }
        }
        p.classList.add("active");
        var st = p.querySelector(".phase-status");
        if (st) { st.className = "phase-status running"; st.textContent = "running"; }
        state.progressPhase = i;
      }, 600 + i * 1200));
    });
    // final done
    timers.push(setTimeout(function() {
      var last = phases[phases.length - 1];
      last.classList.remove("active");
      last.classList.add("done");
      var st = last.querySelector(".phase-status");
      if (st) { st.className = "phase-status complete"; st.textContent = "complete"; }
    }, 600 + phases.length * 1200));
  }
  // show them on enter
  phases.forEach(function(p, i) {
    setTimeout(function() { p.classList.add("in"); }, i * 100);
  });
  var playBtn = q("#progressPlay");
  if (playBtn) playBtn.addEventListener("click", playPhases);
  var resetBtn = q("#progressReset");
  if (resetBtn) resetBtn.addEventListener("click", resetPhases);
}

  var messages = q("#chatMessages");
  var sidebarItems = qa(".chat-sidebar-item");

    var text = input.value.trim();
    var msg = document.createElement("div");
    msg.className = "chat-msg user";
    msg.textContent = text;
    if (messages) messages.appendChild(msg);
    input.value = "";
    // auto-switch sidebar
    sidebarItems.forEach(function(s) { s.classList.remove("active"); });
    if (text.startsWith("/signal-")) {
      sidebarItems[2].classList.add("active"); // governance
      setTimeout(function() {
        var reply = document.createElement("div");
        reply.className = "chat-msg cmd";
        reply.textContent = "Command recognized: " + text;
        if (messages) messages.appendChild(reply);
        messages.scrollTop = messages.scrollHeight;
      }, 400);
    } else {
      sidebarItems[0].classList.add("active"); // chat
      setTimeout(function() {
        var reply = document.createElement("div");
        reply.className = "chat-msg ai";
        reply.textContent = "Understood. I'll work on that and update you when it's ready.";

        messages.scrollTop = messages.scrollHeight;
      }, 600);

  });
  if (input) input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") { e.preventDefault(); sendBtn.click(); }
  });
}

dy.style.background=dark?"#111827":"#f9fafb";document.body.style.color=dark?"#f3f4f6":"#111";document.querySelectorAll(".col").forEach(function(c){c.style.background=dark?"#1f2937":"#fff";c.style.borderColor=dark?"#374151":"#e5e7eb"});document.querySelectorAll(".card").forEach(function(c){c.style.background=dark?"#111827":"#f9fafb";c.style.borderColor=dark?"#374151":"#e5e7eb"});document.getElementById("darkBtn").textContent=dark?"Light mode":"Dark mode"})<\/script>';

function wireFiles() {
  var list = q("#fileList");
  if (!list) return;
  list.innerHTML = "";
  FILE_DATA.forEach(function(f, i) {
    var row = document.createElement("div");
    row.className = "file-row";
    row.innerHTML = '<span class="file-emoji">' + f.icon + '</span><span>' + f.name + '</span><span class="file-badge ' + f.badge + '">' + f.badge.toUpperCase() + '</span>';
    row.addEventListener("click", function() {
      qa("#fileList .file-row").forEach(function(r) { r.classList.remove("selected"); });
      row.classList.add("selected");
      var peek = q("#filePeek");
      if (peek) peek.textContent = f.peek;
      var previewArea = q("#filePreviewArea");
      if (previewArea) {
        previewArea.innerHTML = '<div class="file-peek" id="filePeek">' + escapeHtml(f.peek) + '</div>';
      }
    });
    list.appendChild(row);
    setTimeout(function() { row.classList.add("in"); }, 150 + i * 100);
  });
  var treeBtn = q("#fileTreeBtn");
  if (treeBtn) treeBtn.addEventListener("click", function() {
    var previewArea = q("#filePreviewArea");
    if (previewArea) {
      previewArea.innerHTML = '<div class="file-peek" id="filePeek"><span class="file-peek-empty">\u2190 Tap a file to see its contents.</span></div>';
    }
  });
  var previewBtn = q("#livePreviewBtn");
  if (previewBtn) previewBtn.addEventListener("click", function() {
    var previewArea = q("#filePreviewArea");
    if (previewArea) {
      var blob = new Blob([DEMO_HTML], { type: "text/html" });
      previewArea.innerHTML = '<div class="demo-wrap"><div class="demo-chrome"><span class="demo-dot r"></span><span class="demo-dot y"></span><span class="demo-dot g"></span><span class="demo-addr">localhost:5173</span></div><iframe class="demo-frame" id="demoFrame" sandbox="allow-scripts" title="Live preview"></iframe></div>';
      var frame = previewArea.querySelector("#demoFrame");
      if (frame) frame.src = URL.createObjectURL(blob);
    }
  });
}

function escapeHtml(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function wireSecrets() {
  function render() {
    var container = q("#secretsList");
    if (!container) return;
    container.innerHTML = state.secretsList.map(function(s, i) {
      return '<div class="secret-row"><div><div class="secret-name">' + s.name + '</div><div class="secret-mask">' + (s.masked ? "\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022\u2022" : s.value) + '</div></div><div class="secret-btns">' + (s.public ? '<button class="secret-btn">Copy</button>' : '<button class="secret-btn" data-i="' + i + '">' + (s.masked ? "Reveal" : "Hide") + '</button><button class="secret-btn">Copy</button>') + '</div></div>';
    }).join("");
    qa(".secret-btn[data-i]").forEach(function(b) {
      b.addEventListener("click", function() {
        var i = Number(b.dataset.i);
        state.secretsList[i].masked = !state.secretsList[i].masked;
        render();
      });
    });
  }
  render();
  var importBtn = q("#secretImport");
  if (importBtn) importBtn.addEventListener("click", function() {
    var diff = q("#envDiff");
    if (diff) diff.style.display = "block";
  });
  var cancelBtn = q("#envDiffCancel");
  if (cancelBtn) cancelBtn.addEventListener("click", function() {
    var diff = q("#envDiff");
    if (diff) diff.style.display = "none";
  });
  var applyBtn = q("#envDiffApply");
  if (applyBtn) applyBtn.addEventListener("click", function() {
    state.secretsList.push({ name: "REDIS_URL", value: "redis://localhost:6379", masked: true, public: false });
    state.secretsList.push({ name: "JWT_SECRET", value: "eyJhbG...secret", masked: true, public: false });
    render();
    var diff = q("#envDiff");
    if (diff) diff.style.display = "none";
    applyBtn.textContent = "\u2713 Applied";
    applyBtn.disabled = true;
  });
}

function wireTestDebt() {
  var mutScore = 91;
  function renderDebt() {
    var box = q("#debtListBox");
    if (!box) return;
    box.innerHTML = state.testDebt.map(function(d) {
      return '<div class="debt-entry"><div class="debt-title">' + d.title + '</div><div class="debt-meta">open \u00b7 needs test</div></div>';
    }).join("");
  }
  renderDebt();
  var addTestBtn = q("#mutAddTest");
  if (addTestBtn) addTestBtn.addEventListener("click", function() {
    mutScore = 97;
    var scoreEl = q("#mutScore");
    if (scoreEl) scoreEl.textContent = mutScore + "%";
    var fillEl = q("#mutFill");
    if (fillEl) {
      fillEl.style.width = mutScore + "%";
      fillEl.style.background = "linear-gradient(90deg, var(--green), #aee9c8)";
    }
    var statusEl = q("#mutStatus");
    if (statusEl) {
      statusEl.style.color = "var(--green)";
      statusEl.textContent = "\u2713 Above threshold \u2014 0 surviving mutants";
    }
    var card = q(".mutation-card");
    if (card) {
      card.style.background = "var(--green-soft)";
      card.style.borderColor = "var(--green)";
    }
  });
  var dismissBtn = q("#mutDismiss");
  if (dismissBtn) dismissBtn.addEventListener("click", function() {
    state.enforcementOverrides++;
    var statusEl = q("#mutStatus");
    if (statusEl) statusEl.textContent = "\u26a0 Dismissed (audit-logged)";
    dismissBtn.textContent = "\u2713 Logged";
    dismissBtn.disabled = true;
  });
  var logBtn = q("#debtLog");
  if (logBtn) logBtn.addEventListener("click", function() {
    var titleEl = q("#debtTitle");
    var title = titleEl ? titleEl.value.trim() : "";
    if (!title) return;
    state.testDebt.push({ title: title });
    if (titleEl) titleEl.value = "";
    var detailEl = q("#debtDetail");
    if (detailEl) detailEl.value = "";
    renderDebt();
  });
}

function wireDone() {
  var overEl = q("#finalOver");
  if (overEl) overEl.textContent = state.enforcementOverrides;
  var gatesEl = q("#finalGates");
  if (gatesEl) gatesEl.textContent = state.signedGates.size || 6;
  var restartBtn = q("#restartBtn");
  if (restartBtn) restartBtn.addEventListener("click", restartTour);
}

function restartTour() {
  state.current = 0;
  state.visited = new Set([0]);
  state.signedGates.clear();
  state.testDebt = [];
  state.enforcementOverrides = 0;
  state.selectedVerdict = null;
  state.selectedTier = null;
  slideEls.forEach(function(el, i) { el.classList.toggle("active", i === 0); });
  refreshRail();
}

// ─── Boot ────────────────────────────────────────────────────────────────────
refreshRail();
</script>
