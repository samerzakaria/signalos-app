id: scenario_131
wave: "W11"
title: "doc drift detects stale markdown files"
steps:
  - action: cli
    command: "python3 -c \"import sys, os, time; sys.path.insert(0,'cli'); from signalos_lib.velocity import detect_doc_drift; from pathlib import Path; import tempfile; t=Path(tempfile.mkdtemp()); d=t/'docs'; d.mkdir(); f=d/'OLD.md'; f.write_text('old'); old_ts=time.time()-40*86400; os.utime(f,(old_ts,old_ts)); entries=detect_doc_drift(t, docs_dir='docs', max_age_days=30); print(entries[0].status)\""
    expect_exit: 0
    expect_stdout_contains: "stale"
