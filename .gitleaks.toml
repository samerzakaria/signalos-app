# Gitleaks configuration — allow-list intentional test fixtures.
#
# Several test files deliberately contain secret-shaped strings to verify
# that our own redaction / validation layers detect them correctly:
#   - python/test_skill_validators.py    -> tests security-audit skill validator
#   - python/test_signalos_attachments.py -> tests attachment redaction
#   - python/test_signalos_secret_guard.py -> tests the secret guard
#   - python/signalos_lib/_bundle/core/execution/hooks/_lib/redact.py
#                                         -> the redaction library's own corpus
#   - src/services/chatResponseGuard.ts   -> the TS chat-response redaction
#                                            module (defines secret-shaped
#                                            regex patterns to strip secrets)
#   - src/services/chatResponseGuard.test.ts -> its fixtures (example AKIA/ghp_
#                                            strings proving redaction works)
#
# All of these are tagged in the human-readable scripts/test-gates.sh
# secret_scan function as well; this file mirrors that exclusion for
# gitleaks so the CI annotations stop crying wolf on intentional fixtures.
#
# Schema reference: https://github.com/gitleaks/gitleaks#configuration

[extend]
useDefault = true

[allowlist]
description = "Intentional secret-shaped test fixtures and the redaction-corpus module"
paths = [
    # Every python/test_*.py may carry intentional fake-shaped secrets to
    # exercise the redaction / secret-scan layers. This is a faithful mirror of
    # the blanket `python/test_*.py) continue` exclusion in scripts/test-gates.sh
    # secret_scan() -- listing fixture files one-by-one drifted and broke CI when
    # a new fixture file (test_secret_write_scan.py) was added.
    '''python/test_.*\.py''',
    '''python/test_skill_validators\.py''',
    '''python/test_signalos_attachments\.py''',
    '''python/test_signalos_secret_guard\.py''',
    '''python/signalos_lib/_bundle/core/execution/hooks/_lib/redact\.py''',
    # The bundle ships protocol templates that occasionally cite example
    # secret-shaped strings in their security-audit guidance. Same rule:
    # exclusion mirrors scripts/test-gates.sh secret_scan().
    '''python/signalos_lib/_bundle/.*''',
    # TS chat-response redaction module + its fixtures: same rationale as
    # redact.py — these files DEFINE secret-shaped patterns / example secrets
    # so the guard can strip real ones. Allowlisted by path (history-wide), the
    # only fix that suppresses the false positive in the original commit since
    # gitleaks scans full history.
    '''src/services/chatResponseGuard\.ts''',
    '''src/services/chatResponseGuard\.test\.ts''',
]
