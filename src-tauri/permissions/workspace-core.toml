[[set]]
identifier = "workspace-core"
description = "SignalOS desktop application commands exposed to the main window."
permissions = [
    "allow-app-commands",
]

[[permission]]
identifier = "allow-app-commands"
description = "Allows the main SignalOS window to invoke registered application commands."
commands.allow = [
    "add_brain_entry",
    "add_test_debt",
    "apply_workspace_env_diff",
    "build_precheck",
    "check_for_updates",
    "check_mutation_threshold",
    "check_role_for_gate",
    "check_test_first",
    "clear_workspace",
    "delete_api_key",
    "delete_workspace_secret",
    "ensure_default_workspace",
    "fetch_provider_models",
    "freeze_wave",
    "get_active_provider",
    "get_audit_trail",
    "get_brain_entries",
    "get_cost_state",
    "get_cost_summary",
    "get_enforcement_state",
    "get_gate_status",
    "get_git_status",
    "get_identity",
    "get_preview",
    "get_project_artifacts",
    "get_sidecar_status",
    "get_velocity_metrics",
    "get_wave_state",
    "get_workspace",
    "get_workspace_status",
    "has_api_key",
    "list_previews",
    "list_providers",
    "list_test_debt",
    "list_workspace_dir",
    "list_workspace_secrets",
    "open_workspace_path",
    "override_rule",
    "preview_workspace_files",
    "probe_node",
    "read_mutation_score",
    "read_workspace_file",
    "record_token_usage",
    "reset_session_cost",
    "resolve_test_debt",
    "restart_python_sidecar",
    "reveal_workspace_secret",
    "run_signal_command",
    "send_provider_message",
    "send_provider_message_stream",
    "set_active_provider",
    "set_identity",
    "set_monthly_budget",
    "set_provider_model",
    "set_provider_pricing",
    "set_rule_mode",
    "set_workspace",
    "sign_gate",
    "start_preview",
    "start_workspace_watch",
    "stop_preview",
    "store_api_key",
    "test_provider_connection",
    "unfreeze_wave",
    "upsert_workspace_secret",
