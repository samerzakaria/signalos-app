<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- SignalOS icon: signal wave on dark background -->
  <rect width="512" height="512" rx="96" fill="#0f0f12"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#1B4FD8" stroke-width="18" stroke-dasharray="1 0" opacity="0.25"/>
  <!-- Mid ring -->
  <circle cx="256" cy="256" r="120" fill="none" stroke="#1B4FD8" stroke-width="14" opacity="0.5"/>
  <!-- Inner dot -->
  <circle cx="256" cy="256" r="36" fill="#1B4FD8"/>
  <!-- Signal arc top-right -->
  <path d="M 340 172 A 120 120 0 0 1 340 340" fill="none" stroke="#60a5fa" stroke-width="18" stroke-linecap="round"/>
  <!-- Signal arc top-right outer -->
  <path d="M 376 136 A 172 172 0 0 1 376 376" fill="none" stroke="#3b82f6" stroke-width="14" stroke-linecap="round" opacity="0.6"/>
</svg>
